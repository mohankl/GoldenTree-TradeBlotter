<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64" role="img" aria-label="GoldenTree Trade Blotter">
  <title>GoldenTree</title>
  <!-- Original horizontal wordmark, inspired by (not copied from) GoldenTree
       Asset Management. Glyph = layered golden conifer / ascending chart.
       Wordmark uses a system font stack (no embedded fonts). Dark grounds. -->
  <defs>
    <linearGradient id="gtGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFD68A"/>
      <stop offset="0.55" stop-color="#E3C15A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- Glyph: the 64-unit mark, scaled to 52px and vertically centered -->
  <g transform="translate(6 6) scale(0.8125)" stroke-linejoin="round">
    <rect x="28.5" y="45" width="7" height="11" rx="1.5" fill="#9A7B1C"/>
    <path d="M32 7 L42.5 22 L21.5 22 Z" fill="url(#gtGold)"/>
    <path d="M32 18.5 L47.5 34 L16.5 34 Z" fill="url(#gtGold)"/>
    <path d="M32 30 L52.5 46 L11.5 46 Z" fill="url(#gtGold)"/>
  </g>

  <!-- Wordmark (system font stack — depends on host system fonts) -->
  <text x="66" y="42"
        font-family="'Inter','Helvetica Neue',Helvetica,Arial,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="30" font-weight="700" letter-spacing="0.2">
    <tspan fill="#E8EDE9">Golden</tspan><tspan fill="#E3C15A">Tree</tspan>
  </text>
</svg>
