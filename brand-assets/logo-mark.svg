<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="GoldenTree mark">
  <title>GoldenTree mark</title>
  <!-- Original glyph, inspired by (not copied from) GoldenTree's aesthetic.
       A layered golden conifer whose stacked canopy tiers read as an
       ascending chart: tree = growth = uptrend. Reads on a dark ground. -->
  <defs>
    <linearGradient id="gtMark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFD68A"/>
      <stop offset="0.55" stop-color="#E3C15A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <g stroke-linejoin="round">
    <!-- trunk -->
    <rect x="28.5" y="45" width="7" height="11" rx="1.5" fill="#9A7B1C"/>
    <!-- canopy tiers: apex centered on x=32, each wider stepping down -->
    <path d="M32 7 L42.5 22 L21.5 22 Z" fill="url(#gtMark)"/>
    <path d="M32 18.5 L47.5 34 L16.5 34 Z" fill="url(#gtMark)"/>
    <path d="M32 30 L52.5 46 L11.5 46 Z" fill="url(#gtMark)"/>
  </g>
</svg>
